  HIERARCHY_MK_TYPE_PANEL = 2;
  HIERARCHY_MK_TYPE_TEXT = 3;
  HIERARCHY_MK_TYPE_TMP = 4;
  HIERARCHY_MK_TYPE_IMAGE = 5;
  HIERARCHY_MK_TYPE_BUTTON = 6;
  HIERARCHY_MK_TYPE_TOGGLE = 7;
  HIERARCHY_MK_TYPE_SLIDER = 8;
  HIERARCHY_MK_TYPE_SCROLLBAR = 9;
  HIERARCHY_MK_TYPE_SCROLL_VIEW = 10;
  HIERARCHY_MK_TYPE_EVENT_SYSTEM = 11;
  HIERARCHY_MK_TYPE_CUBE = 12;
  HIERARCHY_MK_TYPE_SPHERE = 13;
  HIERARCHY_MK_TYPE_CAPSULE = 14;
  HIERARCHY_MK_TYPE_CYLINDER = 15;
  HIERARCHY_MK_TYPE_PLANE = 16;
  HIERARCHY_MK_TYPE_QUAD = 17;
  HIERARCHY_MK_TYPE_DIR_LIGHT = 18;
  HIERARCHY_MK_TYPE_DIRECTIONAL_LIGHT = 19;
  HIERARCHY_MK_TYPE_POINT_LIGHT = 20;
